name: Java CI - Dev

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: overlook_hotel_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d overlook_hotel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/overlook_hotel_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      SPRING_SECURITY_USER_NAME: ci
      SPRING_SECURITY_USER_PASSWORD: ${{ secrets.CI_SECURITY_PASSWORD }}
      APP_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: maven
          cache-dependency-path: master/pom.xml

      - name: Make Maven wrapper executable
        working-directory: master
        run: chmod +x mvnw

      - name: Build and test with Maven
        working-directory: master
        run: ./mvnw -B verify
