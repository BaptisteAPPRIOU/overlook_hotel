name: CD - Production

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/overlook-hotel

jobs:
  validate:
    name: Validation avant production
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: overlook_hotel_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d overlook_hotel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: ci
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/overlook_hotel_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      SPRING_SECURITY_USER_NAME: ci
      SPRING_SECURITY_USER_PASSWORD: ${{ secrets.CI_SECURITY_PASSWORD }}
      APP_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25.0.3"
          distribution: temurin
          cache: maven
          cache-dependency-path: master/pom.xml

      - name: Make Maven wrapper executable
        working-directory: master
        run: chmod +x mvnw

      - name: Build, test and analyze
        working-directory: master
        run: ./mvnw -B -Pquality verify

      - name: Upload production candidate JAR
        uses: actions/upload-artifact@v4
        with:
          name: overlook-hotel-production-candidate
          path: master/target/*.jar

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-test-reports
          path: master/target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-quality-reports
          path: |
            master/target/site/jacoco/
            master/target/pmd.xml
            master/target/spotbugsXml.xml
          if-no-files-found: ignore

  publish-image:
    name: Publication image GHCR
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: master
          file: master/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
