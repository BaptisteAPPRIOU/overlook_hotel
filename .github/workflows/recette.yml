name: CD - Recette

on:
  push:
    branches: ["recette"]
  pull_request:
    branches: ["recette"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recette-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validation applicative
    runs-on: ubuntu-latest
    environment: recette

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: overlook_hotel_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d overlook_hotel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: ci
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/overlook_hotel_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      SPRING_SECURITY_USER_NAME: ci
      SPRING_SECURITY_USER_PASSWORD: ${{ secrets.CI_SECURITY_PASSWORD }}
      APP_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25.0.3"
          distribution: temurin
          cache: maven
          cache-dependency-path: master/pom.xml

      - name: Make Maven wrapper executable
        working-directory: master
        run: chmod +x mvnw

      - name: Build and test
        working-directory: master
        run: ./mvnw -B verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: overlook-hotel-recette-jar
          path: master/target/*.jar

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recette-test-reports
          path: master/target/surefire-reports/
          if-no-files-found: ignore

  docker:
    name: Image Docker de recette
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    environment: recette

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: master
          file: master/Dockerfile
          push: false
          tags: overlook-hotel:recette-${{ github.sha }}
          outputs: type=docker,dest=/tmp/overlook-hotel-recette.tar

      - name: Upload Docker image archive
        uses: actions/upload-artifact@v4
        with:
          name: overlook-hotel-recette-image
          path: /tmp/overlook-hotel-recette.tar
