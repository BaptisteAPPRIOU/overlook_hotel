name: CD - Recette

on:
  push:
    branches: ["recette"]
  pull_request:
    branches: ["recette"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recette-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validation applicative
    runs-on: ubuntu-latest
    environment: recette

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: overlook_hotel_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d overlook_hotel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_PROFILES_ACTIVE: ci
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/overlook_hotel_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      SPRING_SECURITY_USER_NAME: ci
      SPRING_SECURITY_USER_PASSWORD: ${{ secrets.CI_SECURITY_PASSWORD }}
      APP_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25.0.3"
          distribution: temurin
          cache: maven
          cache-dependency-path: master/pom.xml

      - name: Make Maven wrapper executable
        working-directory: master
        run: chmod +x mvnw

      - name: Build, test and analyze
        working-directory: master
        run: ./mvnw -B -Pquality verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: overlook-hotel-recette-jar
          path: master/target/*.jar

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recette-test-reports
          path: master/target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recette-quality-reports
          path: |
            master/target/site/jacoco/
            master/target/pmd.xml
            master/target/spotbugsXml.xml
          if-no-files-found: ignore

  docker:
    name: Recette Docker et tests d'integration
    runs-on: ubuntu-latest
    needs: validate
    environment: recette
    env:
      RECETTE_POSTGRES_DB: overlook_hotel_recette
      RECETTE_POSTGRES_USER: postgres
      RECETTE_POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      SPRING_SECURITY_USER_NAME: ci
      SPRING_SECURITY_USER_PASSWORD: ${{ secrets.CI_SECURITY_PASSWORD }}
      APP_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      APP_JWT_EXPIRATION_MS: 86400000
      APP_SEED_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25.0.3"
          distribution: temurin
          cache: maven
          cache-dependency-path: master/pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Make Maven wrapper executable
        working-directory: master
        run: chmod +x mvnw

      - name: Build and start recette stack
        run: |
          docker compose -f compose.recette.yml build
          docker compose -f compose.recette.yml up -d

      - name: Wait for application health
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              exit 0
            fi
            docker compose -f compose.recette.yml ps
            sleep 5
          done
          docker compose -f compose.recette.yml logs --no-color
          exit 1

      - name: Run integration test profile
        working-directory: master
        run: ./mvnw -B -Pintegration -Drecette.base-url=http://localhost:8080 verify

      - name: Archive Docker image
        run: docker save overlook-hotel:recette -o /tmp/overlook-hotel-recette.tar

      - name: Export recette Docker logs
        if: always()
        run: docker compose -f compose.recette.yml logs --no-color > /tmp/overlook-hotel-recette-compose.log

      - name: Upload Docker image archive
        uses: actions/upload-artifact@v4
        with:
          name: overlook-hotel-recette-image
          path: /tmp/overlook-hotel-recette.tar

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recette-integration-test-reports
          path: master/target/failsafe-reports/
          if-no-files-found: ignore

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recette-docker-logs
          path: /tmp/overlook-hotel-recette-compose.log
          if-no-files-found: ignore

      - name: Stop recette stack
        if: always()
        run: docker compose -f compose.recette.yml down --volumes
